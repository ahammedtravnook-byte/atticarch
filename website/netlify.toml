# ATTICARCH — Netlify config (base directory is "website" in the Netlify UI).
# This file only ADDS functions + redirect config; the build command and
# publish directory continue to come from the Netlify dashboard settings.

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  # firebase-admin has native/dynamic requires — install it alongside the
  # bundle instead of inlining it, which is more reliable.
  external_node_modules = ["firebase-admin"]

# SPA fallback so React Router deep links resolve on hard loads.
# (Netlify already reserves /.netlify/functions/* for functions, so no explicit
# passthrough redirect is needed — and one starting with /.netlify is invalid.)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
